<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enneagram Type Finder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  #app { max-width: 600px; width: 100%; padding: 2rem; }
  h1 {
    font-size: 1.4rem; font-weight: 300; color: #888; margin-bottom: 2rem;
    text-align: center; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .progress { display: flex; gap: 6px; margin-bottom: 2rem; justify-content: center; }
  .progress .dot { width: 8px; height: 8px; border-radius: 50%; background: #222; transition: background 0.3s; }
  .progress .dot.done { background: #4a9eff; }
  .progress .dot.current { background: #4a9eff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .question-num { text-align: center; color: #555; font-size: 0.8rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .phase-tag {
    text-align: center; margin-bottom: 1rem;
  }
  .phase-tag span {
    font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-family: monospace;
    background: #0d1520; color: #4a9eff; border: 1px solid #1a3050;
  }
  .choices { display: flex; flex-direction: column; gap: 1rem; }
  .choice {
    padding: 1.5rem; background: #111; border: 1px solid #222; border-radius: 12px;
    cursor: pointer; transition: all 0.2s; font-size: 1rem; line-height: 1.5; text-align: left;
  }
  .choice:hover { border-color: #4a9eff; background: #0d1520; }
  .choice:active { transform: scale(0.98); }
  .choice.disabled { pointer-events: none; opacity: 0.4; }
  .loading { text-align: center; color: #444; padding: 3rem; font-size: 0.9rem; }
  .loading::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

  /* Report button */
  .report-row { text-align: center; margin-top: 1rem; }
  .report-btn {
    background: none; border: none; color: #333; cursor: pointer; font-size: 0.75rem;
    display: inline-flex; align-items: center; gap: 4px; transition: color 0.15s; padding: 4px 8px;
  }
  .report-btn:hover { color: #ef4444; }
  .report-btn svg { width: 14px; height: 14px; }

  /* Diagnostics panel */
  .diag {
    margin-top: 1.5rem; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px;
    padding: 1rem; font-size: 0.75rem;
  }
  .diag .d-section { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid #151515; }
  .diag .d-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .diag .d-heading {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: #444; margin-bottom: 0.5rem;
  }
  /* Type grid */
  .type-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
  .type-cell { text-align: center; padding: 6px 2px; border-radius: 6px; transition: all 0.4s; border: 1px solid transparent; }
  .type-cell .tc-num { font-family: monospace; font-size: 0.85rem; font-weight: 600; line-height: 1; }
  .type-cell .tc-pct { font-family: monospace; font-size: 0.55rem; margin-top: 2px; opacity: 0.7; }
  .type-cell .tc-bar { height: 3px; border-radius: 2px; margin: 4px auto 0; transition: width 0.5s; max-width: 80%; }
  /* Badges */
  .badge-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .badge {
    display: flex; align-items: center; gap: 6px; padding: 4px 10px;
    background: #111; border: 1px solid #1a1a1a; border-radius: 6px; font-size: 0.7rem;
  }
  .badge .b-label { color: #555; }
  .badge .b-val { font-family: monospace; font-weight: 600; }
  .badge .b-val.high { color: #10b981; }
  .badge .b-val.mid { color: #f59e0b; }
  .badge .b-val.low { color: #ef4444; }
  /* Signals */
  .sig-row { display: flex; align-items: center; margin-bottom: 3px; gap: 6px; }
  .sig-name { width: 100px; font-family: monospace; font-size: 0.6rem; color: #444; flex-shrink: 0; }
  .sig-pill { font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
  .sig-pill.set { background: #0d1520; color: #4a9eff; border: 1px solid #1a3050; }
  .sig-pill.unset { background: #111; color: #333; border: 1px solid #1a1a1a; }
  .sig-conf { font-family: monospace; font-size: 0.6rem; color: #333; margin-left: auto; }
  /* Status tags */
  .status-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .status-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; font-family: monospace; }
  .status-tag.ok { background: #0a1f0a; color: #10b981; border: 1px solid #10b98133; }
  .status-tag.warn { background: #1f1a0a; color: #f59e0b; border: 1px solid #f59e0b33; }
  .status-tag.bad { background: #1f0a0a; color: #ef4444; border: 1px solid #ef444433; }
  /* Patterns */
  .pattern-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .pattern-tag {
    font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; font-family: monospace;
    background: #110d1f; color: #a78bfa; border: 1px solid #a78bfa33;
  }
  /* Reasoning */
  .reasoning { font-size: 0.7rem; color: #555; line-height: 1.4; font-style: italic; }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
    z-index: 100; animation: fadeIn 0.15s ease;
  }
  .modal {
    background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 400px;
  }
  .modal h3 { font-size: 0.9rem; color: #ccc; margin-bottom: 1rem; font-weight: 400; }
  .modal .star-row { text-align: left; margin-bottom: 1rem; }
  .modal .star-row label { font-size: 0.75rem; color: #555; display: block; margin-bottom: 6px; }
  .modal .star { font-size: 1.4rem; cursor: pointer; color: #333; transition: color 0.15s; padding: 0 2px; background: none; border: none; }
  .modal .star:hover, .modal .star.on { color: #f59e0b; }
  .modal textarea {
    width: 100%; background: #0a0a0a; border: 1px solid #222; color: #ccc; padding: 8px 10px;
    border-radius: 6px; font-size: 0.85rem; font-family: inherit; resize: vertical; min-height: 60px; margin-bottom: 1rem;
  }
  .modal textarea:focus { outline: none; border-color: #4a9eff; }
  .modal textarea::placeholder { color: #444; }
  .modal .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .modal .modal-actions button { padding: 6px 16px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: none; }
  .modal .btn-cancel { background: #222; color: #888; }
  .modal .btn-cancel:hover { background: #2a2a2a; }
  .modal .btn-submit { background: #4a9eff; color: #fff; }
  .modal .btn-submit:hover { background: #3a8eef; }

  /* Result page */
  .result { text-align: center; animation: fadeIn 0.5s ease; }
  .result .type-num { font-size: 5rem; font-weight: 200; color: #4a9eff; line-height: 1; }
  .result .type-name { font-size: 1.3rem; color: #888; margin: 0.5rem 0 1.5rem; font-weight: 300; }
  .result .summary { font-size: 1rem; line-height: 1.7; color: #aaa; max-width: 480px; margin: 0 auto 2rem; }
  .result .conf-note { font-size: 0.8rem; color: #555; margin-bottom: 1.5rem; font-style: italic; }
  .result .distribution { margin-top: 1rem; text-align: left; }
  .result .distribution .row { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.8rem; }
  .result .distribution .row .num { width: 30px; color: #555; font-family: monospace; }
  .result .distribution .row .bar-bg { flex: 1; height: 4px; background: #1a1a1a; border-radius: 2px; margin: 0 10px; overflow: hidden; }
  .result .distribution .row .bar-fill { height: 100%; background: #4a9eff; border-radius: 2px; transition: width 0.5s; }
  .result .distribution .row .pct { width: 35px; text-align: right; color: #444; font-family: monospace; }
  .result .distribution .row.top .num { color: #4a9eff; }
  .result .distribution .row.top .bar-fill { background: #4a9eff; }
  .result .distribution .row.top .pct { color: #4a9eff; }

  /* Calibration form */
  .calibration { margin-top: 2rem; padding: 1.5rem; background: #111; border: 1px solid #222; border-radius: 12px; text-align: left; }
  .calibration h3 { font-size: 0.85rem; color: #888; margin-bottom: 1rem; font-weight: 400; }
  .calibration .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; }
  .calibration label { font-size: 0.75rem; color: #555; width: 80px; flex-shrink: 0; }
  .calibration select, .calibration input, .calibration textarea {
    background: #0a0a0a; border: 1px solid #222; color: #ccc; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; flex: 1;
  }
  .calibration select:focus, .calibration input:focus, .calibration textarea:focus { outline: none; border-color: #4a9eff; }
  .calibration textarea { resize: vertical; min-height: 50px; font-family: inherit; }
  .calibration .submit-btn {
    padding: 0.6rem 1.5rem; background: #4a9eff; border: none; color: #fff;
    border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-top: 0.5rem;
  }
  .calibration .submit-btn:hover { background: #3a8eef; }
  .calibration .submit-btn:disabled { opacity: 0.4; cursor: default; }
  .calibration .result-msg { font-size: 0.8rem; margin-top: 0.75rem; }
  .calibration .result-msg.correct { color: #10b981; }
  .calibration .result-msg.wrong { color: #ef4444; }

  #restart {
    margin-top: 1rem; padding: 0.8rem 2rem; background: none; border: 1px solid #333;
    color: #666; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  }
  #restart:hover { border-color: #4a9eff; color: #4a9eff; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .name-form { text-align: center; animation: fadeIn 0.5s ease; }
  .name-form input {
    background: #111; border: 1px solid #222; color: #e0e0e0; padding: 0.8rem 1.2rem;
    border-radius: 8px; font-size: 1rem; width: 100%; max-width: 320px; text-align: center; margin-bottom: 1rem;
  }
  .name-form input:focus { outline: none; border-color: #4a9eff; }
  .name-form input::placeholder { color: #444; }
  .name-form .start-btn {
    display: block; margin: 0 auto; padding: 0.8rem 2.5rem; background: #4a9eff; border: none;
    color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
  }
  .name-form .start-btn:hover { background: #3a8eef; }
  .name-form .start-btn:disabled { opacity: 0.4; cursor: default; }

  .debug {
    margin-top: 2rem; padding: 1rem; background: #0a0a0a; border: 1px solid #1a1a1a;
    border-radius: 8px; font-family: monospace; font-size: 0.7rem; color: #333;
    max-height: 200px; overflow-y: auto; display: none;
  }
  .debug.show { display: block; }
</style>
</head>
<body>
<div id="app">
  <h1>Enneagram</h1>
  <div id="content"><div class="loading">Preparing</div></div>
  <div id="debug" class="debug"></div>
</div>

<script>
let state = {
  sessionId: null, name: null, questionIndex: 0,
  staticQuestions: [], staticAnswers: [],
  serverState: null, lastMetadata: null,
  questionShownAt: null, done: false
};

const $ = sel => document.querySelector(sel);
const content = () => $('#content');
const debug = () => $('#debug');

function log(msg) {
  const d = debug();
  d.classList.add('show');
  d.textContent += msg + '\n';
  d.scrollTop = d.scrollHeight;
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}

function confClass(v) { return v >= 60 ? 'high' : v >= 40 ? 'mid' : 'low'; }

function renderProgress() {
  const total = 25;
  const current = state.questionIndex;
  let dots = '';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'done' : i === current ? 'current' : '';
    dots += `<div class="dot ${cls}"></div>`;
  }
  return `<div class="progress">${dots}</div>`;
}

function renderDiagnostics() {
  const s = state.serverState;
  if (!s) return '';

  const post = s.posterior || {};
  const maxProb = Math.max(...Object.values(post), 1);
  const sorted = Object.entries(post).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0]?.[0];
  const secondType = sorted[1]?.[0];

  const typeCells = [1,2,3,4,5,6,7,8,9].map(n => {
    const prob = post[n] || 0;
    const pct = Math.round(prob);
    const alpha = Math.max(0.05, prob / 100);
    const isTop = String(n) === String(topType);
    const isRunner = String(n) === String(secondType);
    let color, bg, border;
    if (isTop) {
      color = '#4a9eff'; bg = `rgba(74,158,255,${alpha * 0.4})`; border = 'rgba(74,158,255,0.4)';
    } else if (isRunner) {
      color = '#a78bfa'; bg = `rgba(167,139,250,${alpha * 0.35})`; border = 'rgba(167,139,250,0.3)';
    } else if (pct >= 10) {
      color = '#888'; bg = `rgba(255,255,255,${alpha * 0.12})`; border = 'rgba(255,255,255,0.08)';
    } else {
      color = '#333'; bg = 'transparent'; border = 'transparent';
    }
    const barW = Math.max(10, (prob / maxProb) * 100);
    const barColor = isTop ? '#4a9eff' : isRunner ? '#a78bfa' : '#333';
    return `<div class="type-cell" style="background:${bg};border-color:${border}">
      <div class="tc-num" style="color:${color}">${n}</div>
      <div class="tc-pct" style="color:${color}">${pct}%</div>
      <div class="tc-bar" style="width:${barW}%;background:${barColor}"></div>
    </div>`;
  }).join('');

  // Behavioral signals
  const b = s.behavioral || {};
  const dims = [
    { key: 'anger_awareness', label: 'anger' },
    { key: 'pressure_stance', label: 'pressure' },
    { key: 'good_day_anchor', label: 'good day' },
    { key: 'hurt_response', label: 'hurt' },
    { key: 'no_demand_pattern', label: 'no demand' }
  ];
  const sigRows = dims.map(d => {
    const sig = b[d.key] || {};
    const val = sig.value && sig.value !== 'null' ? sig.value : null;
    const conf = sig.confidence || 0;
    return `<div class="sig-row">
      <span class="sig-name">${d.label}</span>
      <span class="sig-pill ${val ? 'set' : 'unset'}">${val || 'unknown'}</span>
      <span class="sig-conf">${conf}%</span>
    </div>`;
  }).join('');

  // Status tags
  const tags = [];
  if (s.target_pair) {
    const cls = s.pair_resolved ? 'ok' : 'warn';
    tags.push(`<span class="status-tag ${cls}">pair: ${s.target_pair} (${s.target_pair_questions}q${s.pair_resolved ? ' done' : ''})</span>`);
  }
  if (s.contradiction_count >= 2) {
    tags.push(`<span class="status-tag bad">${s.contradiction_count} contradictions: ${(s.contradictions||[]).join(', ')}</span>`);
  } else if (s.contradiction_count === 0 && s.question_number > 5) {
    tags.push(`<span class="status-tag ok">no contradictions</span>`);
  }
  if (s.repair_mode) tags.push(`<span class="status-tag warn">repair mode</span>`);

  // Patterns
  const patterns = [];
  if (s.threat_pattern) patterns.push(`<span class="pattern-tag">threat: ${s.threat_pattern}</span>`);
  if (s.move_pattern) patterns.push(`<span class="pattern-tag">move: ${s.move_pattern}</span>`);
  if (s.repeated_cost_pattern) patterns.push(`<span class="pattern-tag">cost: ${s.repeated_cost_pattern}</span>`);

  // Badges
  const wc = s.wing_confidence || 0;
  const wingLabel = s.likely_wing ? `w${s.likely_wing}` : '?';

  // Reasoning
  const reasoning = state.lastMetadata?.reasoning
    ? `<div class="d-section"><div class="reasoning">${state.lastMetadata.reasoning}</div></div>`
    : '';

  // Done gates
  const gates = s.done_gates || [];
  const gateSection = gates.length > 0
    ? `<div class="d-section"><div class="d-heading">Gates (${gates.length} failing)</div><div class="status-row">${gates.map(g => `<span class="status-tag warn">${g.msg}</span>`).join('')}</div></div>`
    : `<div class="d-section"><div class="d-heading">Gates</div><div class="status-row"><span class="status-tag ok">all passing</span></div></div>`;

  return `<div class="diag">
    <div class="d-section">
      <div class="d-heading">Type distribution</div>
      <div class="type-grid">${typeCells}</div>
    </div>
    <div class="d-section">
      <div class="d-heading">Confidence</div>
      <div class="badge-row">
        <div class="badge"><span class="b-label">Wing ${wingLabel}</span><span class="b-val ${confClass(wc)}">${wc}%</span></div>
        <div class="badge"><span class="b-label">Phase</span><span class="b-val" style="color:#4a9eff">${s.phase || '?'}</span></div>
        <div class="badge"><span class="b-label">Budget</span><span class="b-val" style="color:#888">${s.budget_remaining || '?'}</span></div>
      </div>
    </div>
    <div class="d-section">
      <div class="d-heading">Behavioral signals</div>
      ${sigRows}
    </div>
    <div class="d-section">
      <div class="d-heading">Checks</div>
      <div class="status-row">${tags.join('') || '<span class="status-tag" style="color:#333">pending</span>'}</div>
    </div>
    ${patterns.length > 0 ? `<div class="d-section"><div class="d-heading">Patterns</div><div class="pattern-row">${patterns.join('')}</div></div>` : ''}
    ${reasoning}
    ${gateSection}
  </div>`;
}

function renderLoading() {
  content().innerHTML = `${renderProgress()}<div class="loading">Thinking</div>${renderDiagnostics()}`;
}

// ─── Static Questions ───────────────────────────────────────────────

function renderStaticQuestion(sq) {
  state.questionShownAt = Date.now();
  const qNum = state.questionIndex + 1;
  content().innerHTML = `
    ${renderProgress()}
    <div class="question-num">Question ${qNum}</div>
    <div class="phase-tag"><span>calibration: ${sq.dimension}</span></div>
    ${sq.stem ? `<p style="color:#e0e0e0;text-align:center;margin-bottom:1.5rem;font-size:1.2rem;font-weight:300;">${sq.stem}</p>` : ''}
    <div class="choices">
      <div class="choice" data-pick="a">${sq.a}</div>
      <div class="choice" data-pick="b">${sq.b}</div>
    </div>
  `;
  document.querySelectorAll('.choice').forEach(el => {
    el.addEventListener('click', () => handleStaticAnswer(el.dataset.pick, sq));
  });
}

async function handleStaticAnswer(pick, sq) {
  document.querySelectorAll('.choice').forEach(el => el.classList.add('disabled'));
  const responseTimeMs = state.questionShownAt ? Date.now() - state.questionShownAt : 0;
  const chosenText = pick === 'a' ? sq.a : sq.b;
  const unchosenText = pick === 'a' ? sq.b : sq.a;

  state.staticAnswers.push({
    question_number: state.questionIndex + 1,
    dimension: sq.dimension,
    picked: pick,
    chosen_text: chosenText,
    unchosen_text: unchosenText,
    option_a: sq.a,
    option_b: sq.b,
    response_time_ms: responseTimeMs,
    signal: sq.signal
  });
  state.questionIndex++;

  if (state.questionIndex < state.staticQuestions.length) {
    renderStaticQuestion(state.staticQuestions[state.questionIndex]);
    return;
  }

  // Calibration complete — send to server
  renderLoading();
  try {
    const res = await api('POST', '/api/calibration', {
      session_id: state.sessionId,
      answers: state.staticAnswers
    });

    if (res.error) throw new Error(res.error);

    state.serverState = res.state;
    state.questionIndex = res.state.question_number;

    if (res.done) {
      renderResult(res.result, res.state);
    } else {
      state.lastMetadata = res.metadata;
      renderAdaptiveQuestion(res.question, res.metadata);
    }
  } catch (err) {
    log('Error: ' + err.message);
    content().innerHTML = `<div class="loading" style="color:#ff4a4a">Error: ${err.message}. Refresh to retry.</div>`;
  }
}

// ─── Adaptive Questions ─────────────────────────────────────────────

function renderAdaptiveQuestion(question, metadata) {
  state.questionShownAt = Date.now();
  const qNum = state.questionIndex;
  const purposeTag = metadata?.purpose || 'adaptive';
  const pairTag = metadata?.pair ? ` ${metadata.pair}` : '';
  const splitterTag = metadata?.splitter ? ` (${metadata.splitter})` : '';

  content().innerHTML = `
    ${renderProgress()}
    <div class="question-num">Question ${qNum}</div>
    <div class="phase-tag"><span>${purposeTag}${pairTag}${splitterTag}</span></div>
    <div class="choices">
      <div class="choice" data-pick="a">${question.a}</div>
      <div class="choice" data-pick="b">${question.b}</div>
    </div>
    <div class="report-row">
      <button class="report-btn" id="report-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        Report this question
      </button>
    </div>
    ${renderDiagnostics()}
  `;
  document.querySelectorAll('.choice').forEach(el => {
    el.addEventListener('click', () => handleAdaptiveAnswer(el.dataset.pick, question));
  });
  $('#report-btn')?.addEventListener('click', () => {
    showReportModal(state.sessionId, qNum, question.a, question.b);
  });
}

async function handleAdaptiveAnswer(pick, question) {
  document.querySelectorAll('.choice').forEach(el => el.classList.add('disabled'));
  const responseTimeMs = state.questionShownAt ? Date.now() - state.questionShownAt : 0;
  const chosenText = pick === 'a' ? question.a : question.b;
  const unchosenText = pick === 'a' ? question.b : question.a;

  renderLoading();

  try {
    const res = await api('POST', '/api/answer', {
      session_id: state.sessionId,
      picked: pick,
      chosen_text: chosenText,
      unchosen_text: unchosenText,
      response_time_ms: responseTimeMs
    });

    if (res.error) throw new Error(res.error);

    state.serverState = res.state;
    state.questionIndex = res.state.question_number;

    if (res.done) {
      renderResult(res.result, res.state);
    } else {
      state.lastMetadata = res.metadata;
      renderAdaptiveQuestion(res.question, res.metadata);
    }
  } catch (err) {
    log('Error: ' + err.message);
    content().innerHTML = `<div class="loading" style="color:#ff4a4a">Error: ${err.message}. Refresh to retry.</div>`;
  }
}

// ─── Result ─────────────────────────────────────────────────────────

function renderResult(result, serverState) {
  state.done = true;
  const post = serverState.posterior || {};
  const sorted = Object.entries(post).sort((a, b) => b[1] - a[1]);
  const maxProb = Math.max(...sorted.map(([,p]) => p), 1);

  const rows = sorted.map(([type, prob]) => {
    const isTop = parseInt(type) === result.type;
    const width = (prob / maxProb) * 100;
    return `<div class="row ${isTop ? 'top' : ''}">
      <span class="num">${type}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${width}%"></div></div>
      <span class="pct">${Math.round(prob)}%</span>
    </div>`;
  }).join('');

  const guessedType = result.type || 0;
  const guessedWing = result.wing || 0;
  const typeOptions = [1,2,3,4,5,6,7,8,9].map(t =>
    `<option value="${t}"${t === guessedType ? ' selected' : ''}>Type ${t}</option>`
  ).join('');
  const wingOptions = [1,2,3,4,5,6,7,8,9].map(t =>
    `<option value="${t}"${t === guessedWing ? ' selected' : ''}>w${t}</option>`
  ).join('');

  content().innerHTML = `
    <div class="result">
      <div class="type-num">${result.type}</div>
      <div class="type-name">${result.wing_name || ''}</div>
      <div class="summary">${result.summary || ''}</div>
      ${result.confidence_note ? `<div class="conf-note">${result.confidence_note}</div>` : ''}
      <div class="distribution">${rows}</div>

      <div class="calibration">
        <h3>What's the real type? (for calibration)</h3>
        <div class="form-row">
          <label>Type</label>
          <select id="actual-type">${typeOptions}</select>
        </div>
        <div class="form-row">
          <label>Wing</label>
          <select id="actual-wing">${wingOptions}</select>
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="cal-notes" placeholder="Optional notes"></textarea>
        </div>
        <button class="submit-btn" id="cal-submit">Save calibration</button>
        <div id="cal-result"></div>
      </div>
      <button id="restart">Start over</button>
    </div>
  `;

  $('#cal-submit').addEventListener('click', async () => {
    const btn = $('#cal-submit');
    btn.disabled = true; btn.textContent = 'Saving...';
    const actualType = parseInt($('#actual-type').value);
    const actualWing = parseInt($('#actual-wing').value);
    const notes = $('#cal-notes').value;
    const res = await api('POST', '/api/sessions/actual', {
      session_id: state.sessionId, actual_type: actualType, actual_wing: actualWing, notes
    });
    const el = $('#cal-result');
    if (res.correct_type && res.correct_wing) {
      el.className = 'result-msg correct'; el.textContent = 'Correct on both type and wing!';
    } else if (res.correct_type) {
      el.className = 'result-msg correct'; el.textContent = 'Type correct, wing wrong.';
    } else {
      el.className = 'result-msg wrong';
      el.textContent = `Wrong — guessed ${result.type}w${result.wing}, actual ${actualType}w${actualWing}. Saved.`;
    }
    btn.textContent = 'Saved';
  });

  $('#restart').addEventListener('click', () => {
    state = { sessionId: null, name: null, questionIndex: 0, staticQuestions: [], staticAnswers: [], serverState: null, lastMetadata: null, questionShownAt: null, done: false };
    showNameForm();
  });
}

// ─── Report Modal ───────────────────────────────────────────────────

function showReportModal(sessionId, qNum, optA, optB) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const stars = [1,2,3,4,5].map(n => `<button class="star" data-star="${n}">&#9733;</button>`).join('');
  overlay.innerHTML = `
    <div class="modal">
      <h3>Report question ${qNum}</h3>
      <div class="star-row"><label>How good was this question?</label>${stars}</div>
      <textarea id="report-complaint" placeholder="What felt off about this question?"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="report-cancel">Cancel</button>
        <button class="btn-submit" id="report-submit">Submit</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  let selectedRating = 0;
  overlay.querySelectorAll('.star').forEach(el => {
    el.addEventListener('click', () => {
      selectedRating = parseInt(el.dataset.star);
      overlay.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('on', i < selectedRating));
    });
  });
  overlay.querySelector('#report-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#report-submit').addEventListener('click', async () => {
    const complaint = overlay.querySelector('#report-complaint').value;
    if (!selectedRating && !complaint.trim()) { overlay.remove(); return; }
    await api('POST', '/api/questions/report', {
      session_id: sessionId, question_number: qNum,
      rating: selectedRating || null, complaint: complaint.trim(),
      option_a: optA, option_b: optB
    });
    overlay.remove();
  });
}

// ─── Name Form ──────────────────────────────────────────────────────

function showNameForm() {
  content().innerHTML = `
    <div class="name-form">
      <p style="color:#555;font-size:0.85rem;margin-bottom:1.5rem;">Enter your name to begin</p>
      <input type="text" id="name-input" placeholder="Your name" autofocus>
      <button class="start-btn" id="begin-btn">Begin</button>
    </div>
  `;
  const input = $('#name-input');
  const btn = $('#begin-btn');
  btn.addEventListener('click', () => startQuiz(input.value.trim()));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(input.value.trim()); });
}

async function startQuiz(name) {
  if (!name) { $('#name-input').focus(); return; }
  renderLoading();

  const res = await api('POST', '/api/sessions', { name });
  state.sessionId = res.id;
  state.name = name;
  state.staticQuestions = res.static_questions || [];
  state.staticAnswers = [];
  log('Session: ' + res.id + ' (' + name + ')');

  if (state.staticQuestions.length > 0) {
    renderStaticQuestion(state.staticQuestions[0]);
  }
}

showNameForm();
</script>
